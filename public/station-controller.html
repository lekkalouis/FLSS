<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Station Controller</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 1rem; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ccc; padding: .5rem; text-align: left; }
      pre { background: #111; color: #d4ffd4; padding: .75rem; min-height: 110px; }
      .pill { border-radius: 999px; padding: .15rem .5rem; font-size: .75rem; }
      .ok { background: #e8f7e8; color: #245c24; }
      .stale { background: #fff4d6; color: #8a6d00; }
    </style>
    <link rel='stylesheet' href='/theme.css' />
</head>
  <body>
    <h1>Station Controller</h1>
    <div class="grid">
      <section>
        <h2>Connected Controllers</h2>
        <table>
          <thead><tr><th>Source</th><th>Status</th><th>Last Seen</th><th>Temp Â°C</th><th>Humidity %</th></tr></thead>
          <tbody id="controllersRows"></tbody>
        </table>
      </section>
      <section>
        <h2>Test Panel (Live Event Feed)</h2>
        <pre id="eventLog">Waiting for events...</pre>
      </section>
    </div>
    <script type="module" src="/station-controller.js"></script>
  </body>
</html>
